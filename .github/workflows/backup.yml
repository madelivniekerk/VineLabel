name: Backup Supabase Data

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install supabase

      - name: Export data from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/backup.py

      - name: Commit backup
        run: |
          git config user.name "VineLabel Backup Bot"
          git config user.email "backup@vinelabel.app"
          git add backup/
          git diff --staged --quiet || git commit -m "chore: backup $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
